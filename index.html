<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treaty Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .chat-container {
      height: calc(100vh - 180px);
    }
    .message-bubble {
      max-width: 85%;
    }
    .typing-indicator span {
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      React.useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!input.trim() || isLoading) return;

        const userMessage = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
        setIsLoading(true);

        try {
          console.log('Sending request to API...');
          const response = await axios.post('http://localhost:8000/api/v1/query', {
            query: userMessage,
            return_scores: true
          }, {
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            timeout: 30000
          });

          console.log('API Response:', response.data);

          // Handle the response format
          if (response.data && response.data.answer) {
            setMessages(prev => [...prev, {
              role: 'assistant',
              content: response.data.answer,
              source: response.data.sources ? response.data.sources[0] : null
            }]);
          } else {
            throw new Error('Invalid response format: missing answer field');
          }
        } catch (error) {
          console.error('Detailed error:', error);
          
          let errorMessage = 'Sorry, I encountered an error. ';
          
          if (error.response) {
            console.error('Error response data:', error.response.data);
            console.error('Error response status:', error.response.status);
            errorMessage += `Server responded with status ${error.response.status}. `;
            if (error.response.data && error.response.data.detail) {
              errorMessage += error.response.data.detail;
            }
          } else if (error.request) {
            console.error('No response received:', error.request);
            errorMessage += 'No response from server. Please check if the API is running.';
          } else if (error.message) {
            console.error('Error message:', error.message);
            errorMessage += error.message;
          }

          setMessages(prev => [...prev, {
            role: 'assistant',
            content: errorMessage,
            isError: true
          }]);
        } finally {
          setIsLoading(false);
        }
      };

      const formatMessage = (content) => {
        if (!content) return '';
        
        try {
          // Split content by newlines and process each line
          return content.split('\n').map((line, i) => {
            // Check if line contains an image
            const imgMatch = line.match(/<img src="([^"]+)" alt="([^"]*)"\s*\/?>/);
            if (imgMatch) {
              return (
                <div key={i} className="my-4">
                  <img
                    src={imgMatch[1]}
                    alt={imgMatch[2]}
                    className="max-w-full h-auto rounded-lg shadow-md mx-auto"
                    style={{ 
                      maxHeight: '300px',
                      maxWidth: '400px',
                      opacity: '0.8',
                      transition: 'opacity 0.3s ease'
                    }}
                    onError={(e) => {
                      console.error('Image failed to load:', imgMatch[1]);
                      // e.target.src = 'https://via.placeholder.com/150?text=Image+Not+Found';
                    }}
                    onLoad={(e) => {
                      e.target.style.opacity = '1';
                    }}
                  />
                </div>
              );
            }
            
            // Check if line is a heading (starts with #)
            if (line.startsWith('#')) {
              const level = line.match(/^#+/)[0].length;
              const text = line.replace(/^#+\s*/, '');
              const Tag = `h${Math.min(level, 6)}`;
              return <Tag key={i} className="font-bold my-2">{text}</Tag>;
            }
            
            // Check if line is a list item
            if (line.match(/^\d+\.\s/)) {
              return <p key={i} className="mb-2 pl-4">{line}</p>;
            }
            
            // Regular text line
            return <p key={i} className="mb-2">{line}</p>;
          });
        } catch (error) {
          console.error('Error formatting message:', error);
          return <p className="text-red-500">Error formatting message. Please try again.</p>;
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-white shadow-sm">
            <div className="max-w-4xl mx-auto px-4 py-4">
              <h1 className="text-2xl font-bold text-gray-800">Treaty Assistant</h1>
              <p className="text-sm text-gray-600">Ask me anything about treaty submissions</p>
            </div>
          </header>

          {/* Chat Container */}
          <div className="flex-1 max-w-4xl w-full mx-auto px-4 py-6">
            <div className="bg-white rounded-lg shadow-lg overflow-hidden flex flex-col h-full">
              {/* Messages Area */}
              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                {messages.map((message, index) => (
                  <div
                    key={index}
                    className={`flex ${message.role === 'user' ? 'justify-end' : 'justify-start'}`}
                  >
                    <div
                      className={`message-bubble rounded-lg px-4 py-2 ${
                        message.role === 'user'
                          ? 'bg-blue-600 text-white'
                          : message.isError
                          ? 'bg-red-100 text-red-800'
                          : 'bg-gray-100 text-gray-800'
                      }`}
                    >
                      {formatMessage(message.content)}
                      {message.source && (
                        <div className="mt-2 text-xs text-gray-500">
                          <details>
                            <summary className="cursor-pointer hover:text-gray-700">
                              View Source
                            </summary>
                            <div className="mt-2 p-2 bg-gray-50 rounded">
                              {formatMessage(message.source)}
                            </div>
                          </details>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {isLoading && (
                  <div className="flex justify-start">
                    <div className="message-bubble bg-gray-100 rounded-lg px-4 py-2">
                      <div className="typing-indicator flex space-x-1">
                        <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                      </div>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              {/* Input Area */}
              <div className="border-t border-gray-200 p-4">
                <form onSubmit={handleSubmit} className="flex space-x-4">
                  <input
                    type="text"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    placeholder="Type your message..."
                    className="flex-1 rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    disabled={isLoading}
                  />
                  <button
                    type="submit"
                    disabled={isLoading || !input.trim()}
                    className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                  >
                    Send
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
