name: Deploy React Frontend (Dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build to /home/ec2-user/tr-chatbot-build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/**"
          target: "/home/ec2-user/tr-chatbot-build"
          strip_components: 1
          timeout: 30s
          command_timeout: 10m

      - name: Move to /var/www/Chatbot-TIER/frontend and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          script: |
            sudo rm -rf /var/www/Chatbot-TIER/frontend
            sudo mkdir -p /var/www/Chatbot-TIER/frontend
            sudo mv /home/ec2-user/tr-chatbot-build/* /var/www/Chatbot-TIER/frontend/
            sudo chown -R ec2-user:ec2-user /var/www/Chatbot-TIER/frontend
            sudo systemctl reload nginx
